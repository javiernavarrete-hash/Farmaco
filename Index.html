<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Farmacología - Modo Estudio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        
        .container {
            background-color: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        /* Estilos del panel de filtros */
        .filter-section {
            background-color: #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            display: none; /* Oculto por defecto */
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 10px;
        }
        .filter-label {
            font-size: 0.85em;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .filter-label input {
            margin-right: 8px;
            cursor: pointer;
        }
        .filter-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            border-top: 1px solid #bdc3c7;
            padding-top: 10px;
        }
        .btn-small {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .btn-small:hover { background-color: #7f8c8d; }
        .btn-apply { background-color: #34495e; }
        .btn-apply:hover { background-color: #2c3e50; }

        .btn-toggle-filters {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-toggle-filters:hover { background-color: #2980b9; }

        /* Estilos de la Ruleta */
        .roulette-box {
            font-size: 2em;
            font-weight: bold;
            color: #3498db;
            margin: 20px 0;
            padding: 20px;
            border: 3px dashed #3498db;
            border-radius: 10px;
            background-color: #ebf5fb;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .main-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 10px;
        }
        .main-btn:hover { background-color: #c0392b; }
        .main-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .question-section {
            margin-top: 30px;
            display: none;
            padding: 20px;
            background-color: #fef9e7;
            border-left: 5px solid #f1c40f;
            border-radius: 5px;
        }
        .question-text {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d35400;
        }
        .answer-text {
            font-size: 1.1em;
            color: #27ae60;
            font-weight: bold;
            margin-top: 15px;
            display: none;
            text-align: left;
            white-space: pre-line;
            background: #eafaf1;
            padding: 15px;
            border-radius: 5px;
        }
        .btn-answer { background-color: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 1em; cursor: pointer; }
        .btn-answer:hover { background-color: #27ae60; }
        .counter { margin-top: 15px; font-size: 0.9em; color: #95a5a6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>💊 Ruleta Farmacológica</h1>
        <p class="subtitle">Modo de estudio sin pistas de categoría.</p>
        
        <button class="btn-toggle-filters" onclick="toggleFilters()">⚙️ Configurar Familias a Estudiar</button>

        <div class="filter-section" id="filterSection">
            <strong>Selecciona las familias que deseas incluir:</strong>
            <div class="filter-grid" id="filterGrid">
                </div>
            <div class="filter-controls">
                <div>
                    <button class="btn-small" onclick="selectAll(true)">Seleccionar Todas</button>
                    <button class="btn-small" onclick="selectAll(false)">Desmarcar Todas</button>
                </div>
                <button class="btn-small btn-apply" onclick="applyFilters()">Aplicar y Cerrar</button>
            </div>
        </div>

        <div class="roulette-box" id="drugDisplay">
            <span>¿Qué fármaco tocará?</span>
        </div>

        <button class="main-btn" id="spinBtn" onclick="spinRoulette()">Girar Ruleta</button>

        <div class="question-section" id="questionSection">
            <div class="question-text" id="questionText"></div>
            <button class="btn-answer" id="answerBtn" onclick="showAnswer()">Revelar Respuesta</button>
            <div class="answer-text" id="answerText"></div>
        </div>
        
        <div class="counter" id="counterText"></div>
    </div>

            { nombres: ["Eritromicina", "Claritromicina", "Azitromicina"], categoria: "Antibióticos: Macrólidos", "Mecanismo de acción": "Inhiben síntesis de proteínas al unirse a subunidad 50s ribosomal.", "Efectos": "Bacteriostáticos.", "Uso clínico": "Neumonía de comunidad, H pylori (Clari), Inf por clamidia.", "Farmacocinética/Efectos adversos": "Prolongan QT, Náuseas, Vómitos. Eritromicina/Claritromicina inhiben CYP450." },
            { nombres: ["Gentamicina", "Amikacina", "Tobramicina", "Estreptomicina"], categoria: "Antibióticos: Aminoglucósidos", "Mecanismo de acción": "Inhiben síntesis de proteínas al unirse a subunidad 30s ribosomal.", "Efectos": "Bactericida rápido, concentración dependiente, Efecto Post-ATB.", "Uso clínico": "Infecciones graves por Gram- aerobias (Pseudomona, Enterobacterias).", "Farmacocinética/Efectos adversos": "Nefrotoxicidad, Ototoxicidad, Bloqueo Neuromuscular." },
            { nombres: ["Ciprofloxacino", "Levofloxacino", "Moxifloxacino"], categoria: "Antibióticos: Fluoroquinolonas", "Mecanismo de acción": "Inhibición de ADN Topoisomerasa II (Adn Girasa) y Topoisomerasa IV.", "Efectos": "Bactericida. Top II=Gram -, Top IV=Gram +.", "Uso clínico": "ITU, Diarrea Bacteriana, Neumonías (Levo/Moxi).", "Farmacocinética/Efectos adversos": "Fotosensibilidad, Prolongación QT, Tendinitis (Ruptura). No en <18 años." },
            { nombres: ["Trimetoprim-Sulfametoxazol", "Sulfadiazina"], categoria: "Antibióticos: Sulfonamidas", "Mecanismo de acción": "Análogos de PABA, inhiben Dihidropteroato sintasa y Dihidrofolato reductasa (Sinergia).", "Efectos": "Bactericida por inhibición de purinas/ADN.", "Uso clínico": "Neumonía por Pneumocystis, Toxoplasmosis, ITU.", "Farmacocinética/Efectos adversos": "Sx de Steven Johnson, Kernicterus, Cristaluria, Anemia hemolítica en déficit G6PD." },
            { nombres: ["Hidrocortisona", "Prednisona", "Dexametasona", "Betametasona"], categoria: "Glucocorticoides", "Mecanismo de acción": "Inhibición indirecta de Fosfolipasa A2 por inducción de Lipocortina 1/Anexina 1. Inhibe F.T. Inflamatorios.", "Efectos": "Suprime migración leucocitaria, Antiinflamatorio e inmunosupresor profundo.", "Uso clínico": "Asma, Artritis, Anaflaxia, Colitis, Sx Nefrótico, Maduración pulmonar fetal (Dexa/Beta).", "Farmacocinética/Efectos adversos": "Sx de Cushing, Osteoporosis, DM, Úlceras Gástricas, Inmunosupresión, Glaucoma, Psicosis." },
            { nombres: ["Aspirina", "Diclofenaco", "Ibuprofeno", "Naproxeno", "Ketorolaco", "Celecoxib", "Meloxicam"], categoria: "AINEs", "Mecanismo de acción": "Inhibidores COX1 y COX2 (Celecoxib selectivo COX2).", "Efectos": "Inhiben síntesis de PG (Prostaglandinas). Antiinflamatorios, analgésicos, antipiréticos.", "Uso clínico": "AR, Osteoartritis, Dolor, Fiebre, Gota aguda.", "Farmacocinética/Efectos adversos": "Nefrotoxicidad, Úlceras GI, Hemorragia, HTA." },
            { nombres: ["Alopurinol", "Citrato de K", "D Penicilamina"], categoria: "Tratamiento de Gota y Cálculos", "Mecanismo de acción": "Alopurinol inhibe Xantino Oxidasa. Citrato alcaliniza pH.", "Efectos": "Disminuyen niveles de ácido úrico o previenen formación de cálculos.", "Uso clínico": "Gota crónica (Alopurinol), Cálculos renales.", "Farmacocinética/Efectos adversos": "Sx de Hipersensibilidad, Mielosupresión (Alopurinol)." }
        ];

        let allDrugsDespacked = [];
        let activeDrugs = [];
        const allowedHeaders = ["Mecanismo de acción", "Efectos", "Uso clínico", "Farmacocinética/Efectos adversos", "Extra"];

        // 1. Inicialización
        window.onload = () => {
            // Desempaquetar
            rawData.forEach(group => {
                group.nombres.forEach(drugName => {
                    let individualDrug = { ...group };
                    individualDrug.nombre = drugName;
                    delete individualDrug.nombres;
                    allDrugsDespacked.push(individualDrug);
                });
            });

            // Crear Filtros
            const uniqueCategories = [...new Set(rawData.map(item => item.categoria))];
            const filterGrid = document.getElementById("filterGrid");
            
            uniqueCategories.forEach((cat, index) => {
                const label = document.createElement("label");
                label.className = "filter-label";
                label.innerHTML = `<input type="checkbox" class="cat-checkbox" value="${cat}" checked> ${cat}`;
                filterGrid.appendChild(label);
            });

            updateActiveDrugs();
        };

        // Lógica de UI para filtros
        function toggleFilters() {
            const section = document.getElementById("filterSection");
            section.style.display = section.style.display === "none" || section.style.display === "" ? "block" : "none";
        }

        function selectAll(check) {
            document.querySelectorAll(".cat-checkbox").forEach(cb => cb.checked = check);
        }

        function applyFilters() {
            updateActiveDrugs();
            toggleFilters(); // Cerrar el panel
        }

        function updateActiveDrugs() {
            const checkedCategories = Array.from(document.querySelectorAll(".cat-checkbox:checked")).map(cb => cb.value);
            
            activeDrugs = allDrugsDespacked.filter(drug => checkedCategories.includes(drug.categoria));
            
            const spinBtn = document.getElementById("spinBtn");
            if (activeDrugs.length === 0) {
                document.getElementById('counterText').innerText = `⚠️ Ninguna familia seleccionada. Selecciona al menos una.`;
                spinBtn.disabled = true;
            } else {
                document.getElementById('counterText').innerText = `Actualmente hay ${activeDrugs.length} fármacos activos en la ruleta.`;
                spinBtn.disabled = false;
            }
        }

        // Lógica de Ruleta
        let currentDrug = null;
        let currentCharacteristic = "";

        function spinRoulette() {
            if (activeDrugs.length === 0) return;

            const btn = document.getElementById("spinBtn");
            const display = document.getElementById("drugDisplay");
            const questionSection = document.getElementById("questionSection");
            const answerText = document.getElementById("answerText");
            
            questionSection.style.display = "none";
            answerText.style.display = "none";
            btn.disabled = true;

            let spins = 0;
            const maxSpins = 25;
            const intervalTime = 40; 

            const spinInterval = setInterval(() => {
                const randomVisualDrug = activeDrugs[Math.floor(Math.random() * activeDrugs.length)];
                display.innerHTML = `<span>${randomVisualDrug.nombre}</span>`;
                spins++;

                if (spins >= maxSpins) {
                    clearInterval(spinInterval);
                    finalizeSpin();
                    btn.disabled = false;
                }
            }, intervalTime);
        }

        function finalizeSpin() {
            currentDrug = activeDrugs[Math.floor(Math.random() * activeDrugs.length)];
            
            // Cero pistas: Solo se muestra el nombre
            document.getElementById("drugDisplay").innerHTML = `<span>${currentDrug.nombre}</span>`;

            let availableHeaders = allowedHeaders.filter(header => currentDrug[header] && currentDrug[header].trim() !== "");
            
            if (availableHeaders.length > 0) {
                currentCharacteristic = availableHeaders[Math.floor(Math.random() * availableHeaders.length)];
                document.getElementById("questionText").innerText = `¿Cuál es su ${currentCharacteristic}?`;
                document.getElementById("answerText").innerText = currentDrug[currentCharacteristic];
                document.getElementById("questionSection").style.display = "block";
            }
        }

        function showAnswer() {
            document.getElementById("answerText").style.display = "block";
        }
    </script>
</body>
